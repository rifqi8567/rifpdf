worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Timeouts
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Buffer sizes
    client_body_buffer_size 10K;
    # Supabase/auth cookies and Authorization headers can exceed nginx defaults.
    # Keep this bounded, but large enough to avoid rejecting valid uploads before Node sees them.
    client_header_buffer_size 16k;
    client_max_body_size 100M; # Important for large PDF uploads
    large_client_header_buffers 8 64k;

    server_tokens off;

    upstream backend_api {
        server api:3000;
    }

    server {
        listen 80;
        server_name documind.rif123dev.com localhost;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name documind.rif123dev.com;

        ssl_certificate /etc/letsencrypt/live/documind.rif123dev.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/documind.rif123dev.com/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
# limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /health {
            access_log off;
            return 200 'OK';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
