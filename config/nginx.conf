worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Timeouts
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Buffer sizes
    client_body_buffer_size 10K;
    # Supabase/auth cookies and Authorization headers can exceed nginx defaults.
    # Keep this bounded, but large enough to avoid rejecting valid uploads before Node sees them.
    client_header_buffer_size 16k;
    client_max_body_size 100M; # Important for large PDF uploads
    large_client_header_buffers 8 64k;

    # Security Headers
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    upstream backend_api {
        server api:3000;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE configuration (if needed later)
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Healthcheck endpoint
        location /health {
            access_log off;
            return 200 'OK';
        }
    }
}
