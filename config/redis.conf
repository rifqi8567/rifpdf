# DocuMind AI - Redis Optimization for 2GB VPS
maxmemory 150mb
maxmemory-policy allkeys-lru
timeout 60
tcp-keepalive 60

# Persistence (save every 5 mins if 100 keys changed, or every hour if 1 key changed)
save 3600 1
save 300 100

# Prevent background saving errors from stopping writes
stop-writes-on-bgsave-error yes

# Enable AOF for better durability but keep it minimal
appendonly yes
appendfsync everysec
