version: '3.8'

services:
  # 1. Reverse Proxy & API Gateway (Nginx)
  nginx:
    image: nginx:alpine
    container_name: documind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 100m

  # 2. API Server (Node.js)
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind-api
    restart: unless-stopped
    # Port 3000 is now internal, Nginx handles port 80
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 300m
    memswap_limit: 300m
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER:-http://localhost}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - CLEANUP_RETENTION_HOURS=${CLEANUP_RETENTION_HOURS:-24}
      - CLEANUP_BATCH_SIZE=${CLEANUP_BATCH_SIZE:-100}
      - TMP_CLEANUP_DIR=/tmp/documind
      - CONVERSION_SERVICE_URL=http://conversion-api:8000
    depends_on:
      redis:
        condition: service_healthy
      conversion-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. Background Worker (BullMQ + Redis)
  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:worker
    container_name: documind-worker
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 400m
    memswap_limit: 400m
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER:-http://localhost}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - CLEANUP_RETENTION_HOURS=${CLEANUP_RETENTION_HOURS:-24}
      - CLEANUP_BATCH_SIZE=${CLEANUP_BATCH_SIZE:-100}
      - TMP_CLEANUP_DIR=/tmp/documind
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1 # Strictly 1 for 2GB VPS

  # 4. Redis (Message Queue & Caching)
  redis:
    image: redis:7-alpine
    container_name: documind-redis
    restart: unless-stopped
    # Use custom config to limit memory
    command: redis-server /usr/local/etc/redis/redis.conf
    expose:
      - "6379"
    mem_limit: 150m
    memswap_limit: 150m
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 5. Python Office Conversion API (upload/status/download control plane)
  conversion-api:
    build:
      context: ./conversion-service
      dockerfile: Dockerfile
    container_name: documind-conversion-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - CONVERSION_REDIS_URL=redis://redis:6379/1
      - CONVERSION_DATA_DIR=/data/conversions
      - CONVERSION_MAX_UPLOAD_MB=${CONVERSION_MAX_UPLOAD_MB:-50}
      - CONVERSION_CONVERSION_TIMEOUT_SECONDS=${CONVERSION_TIMEOUT_SECONDS:-120}
      - CONVERSION_CLEANUP_RETENTION_HOURS=${CONVERSION_CLEANUP_RETENTION_HOURS:-24}
    volumes:
      - conversion_data:/data/conversions
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 180m
    memswap_limit: 180m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 6. Python LibreOffice Worker (single conversion at a time for 2GB VPS)
  conversion-worker:
    build:
      context: ./conversion-service
      dockerfile: Dockerfile
    command: python worker.py
    container_name: documind-conversion-worker
    restart: on-failure
    environment:
      - CONVERSION_REDIS_URL=redis://redis:6379/1
      - CONVERSION_DATA_DIR=/data/conversions
      - CONVERSION_MAX_UPLOAD_MB=${CONVERSION_MAX_UPLOAD_MB:-50}
      - CONVERSION_CONVERSION_TIMEOUT_SECONDS=${CONVERSION_TIMEOUT_SECONDS:-120}
      - CONVERSION_CLEANUP_RETENTION_HOURS=${CONVERSION_CLEANUP_RETENTION_HOURS:-24}
    volumes:
      - conversion_data:/data/conversions
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 700m
    memswap_limit: 700m

volumes:
  redis_data:
  conversion_data:
